<style>
/* ══════════════════════════════════════════════
   RESET & DESIGN TOKENS
══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  /* surfaces */
  --bg:#080a0b;
  --sur:#0d1012;
  --card:#111518;
  --card2:#161c20;
  --card3:#1a2127;
  /* borders */
  --bor:#1e252c;
  --bor2:#28333d;
  --bor3:#334455;
  /* brand red */
  --red:#e8251a;
  --red2:#c41f15;
  --red3:#ff3d31;
  --red-pale:rgba(232,37,26,.08);
  --red-glow:rgba(232,37,26,.25);
  --red-glow2:rgba(232,37,26,.12);
  /* accents */
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --green:#22c55e;
  --green2:#16a34a;
  --blue:#3b82f6;
  /* text */
  --tx:#eef0f2;
  --tx2:#c8cdd3;
  --mu:#7a8492;
  --mu2:#4e5864;
  /* typography */
  --fh:'Barlow Condensed',sans-serif;
  --fb:'DM Sans',sans-serif;
  --fbng:'Noto Serif Bengali',serif;
  /* radii */
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
  /* spacing */
  --px:5%;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);overflow-x:hidden;min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}

/* ── noise grain ── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}

/* ── pages ── */
.page{display:none;min-height:100vh;position:relative;z-index:1}
.page.active{display:block}
.fade-in{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════════
   ANNOUNCEMENT BAR
══════════════════════════════════════════════ */
.ann{
  background:linear-gradient(90deg,var(--red2),var(--red),var(--red3),var(--red));
  background-size:300% 100%;
  animation:annSlide 5s linear infinite;
  color:#fff;text-align:center;padding:8px 16px;
  font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.6px;line-height:1.4}
@keyframes annSlide{0%{background-position:0% 50%}100%{background-position:100% 50%}}
.ann a{color:#fff;font-weight:800;text-decoration:underline;text-underline-offset:2px;opacity:.95}
.ann a:hover{opacity:1}

/* ══════════════════════════════════════════════
   NAV
══════════════════════════════════════════════ */
nav{
  position:sticky;top:0;z-index:990;height:64px;
  background:rgba(8,10,11,.95);backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--bor);
  display:flex;align-items:center;justify-content:space-between;padding:0 var(--px);gap:12px}
.logo{display:flex;flex-direction:column;line-height:1;cursor:pointer;flex-shrink:0;gap:1px;user-select:none}
.logo-en{font-family:var(--fh);font-weight:900;font-size:24px;letter-spacing:3px;color:#fff;text-transform:uppercase}
.logo-en span{color:var(--red)}
.logo-bn{font-family:var(--fbng);font-size:10px;color:var(--mu);letter-spacing:.5px}
.logo-badge{display:inline-block;background:var(--red);color:#fff;font-family:var(--fh);
  font-size:9px;font-weight:800;letter-spacing:.1em;padding:1px 5px;border-radius:2px;
  vertical-align:super;margin-left:4px;text-transform:uppercase}
.breadcrumb{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap;overflow:hidden;padding:0 10px}
.crumb{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mu);cursor:pointer;background:none;border:none;padding:2px 5px;transition:color .2s;white-space:nowrap}
.crumb:hover,.crumb.cur{color:var(--red)}
.sep{color:var(--bor3);font-size:1rem;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-wa{display:inline-flex;align-items:center;gap:6px;background:var(--green2);color:#fff;
  font-family:var(--fh);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 15px;border-radius:var(--r8);transition:all .2s;white-space:nowrap}
.nav-wa:hover{background:var(--green);transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.3)}
.nav-call{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;
  font-family:var(--fh);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 15px;border-radius:var(--r8);transition:all .2s;white-space:nowrap}
.nav-call:hover{background:var(--red3);transform:translateY(-1px);box-shadow:0 4px 16px var(--red-glow)}
@media(max-width:600px){.nav-call{display:none}.breadcrumb{display:none}}

/* ══════════════════════════════════════════════
   HERO
══════════════════════════════════════════════ */
.hero{
  padding:80px var(--px) 64px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--bor);
  background:var(--bg)}
/* animated grid */
.hero-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(232,37,26,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,37,26,.03) 1px,transparent 1px);
  background-size:48px 48px;
  animation:gridFade 8s ease-in-out infinite alternate}
@keyframes gridFade{from{opacity:.6}to{opacity:1}}
/* diagonal accent line */
.hero-diagonal{
  position:absolute;top:0;right:0;bottom:0;width:50%;pointer-events:none;
  background:linear-gradient(135deg,transparent 40%,rgba(232,37,26,.03) 100%)}
/* glow orb */
.hero-glow{
  position:absolute;top:-120px;right:-100px;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,37,26,.1) 0%,rgba(232,37,26,.04) 40%,transparent 70%);
  pointer-events:none;animation:glowPulse 4s ease-in-out infinite alternate}
@keyframes glowPulse{from{transform:scale(1);opacity:.7}to{transform:scale(1.1);opacity:1}}
.hero-inner{position:relative;z-index:1;max-width:760px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(232,37,26,.1);border:1px solid rgba(232,37,26,.3);
  color:var(--red);font-family:var(--fh);font-size:11px;font-weight:800;
  letter-spacing:.2em;text-transform:uppercase;padding:6px 14px;border-radius:var(--r4);margin-bottom:24px}
.eydot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hero h1{
  font-family:var(--fh);font-weight:900;
  font-size:clamp(3rem,8vw,5.8rem);
  line-height:.88;text-transform:uppercase;letter-spacing:-.02em;
  margin-bottom:12px;color:#fff}
.hero h1 em{font-style:normal;color:var(--red);display:block}
.hero h1 .outline{-webkit-text-stroke:1.5px #fff;color:transparent}
.hero-bn{font-family:var(--fbng);font-size:clamp(1rem,2.5vw,1.5rem);color:var(--mu);margin-bottom:20px;letter-spacing:.02em}
.hero-sub{color:var(--tx2);font-size:15px;max-width:540px;margin-bottom:36px;line-height:1.75;font-weight:300}
.hero-sub strong{color:var(--tx);font-weight:600}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}

/* ── unified button styles ── */
.btn-red{
  display:inline-flex;align-items:center;gap:9px;background:var(--red);color:#fff;
  font-family:var(--fh);font-weight:800;font-size:15px;letter-spacing:.1em;text-transform:uppercase;
  padding:14px 30px;border-radius:var(--r8);border:none;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden}
.btn-red::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);opacity:0;transition:opacity .2s}
.btn-red:hover{background:var(--red3);transform:translateY(-2px);box-shadow:0 10px 32px var(--red-glow);}
.btn-red:hover::after{opacity:1}
.btn-wa-hero{
  display:inline-flex;align-items:center;gap:9px;background:var(--green2);color:#fff;
  font-family:var(--fh);font-weight:800;font-size:15px;letter-spacing:.1em;text-transform:uppercase;
  padding:14px 30px;border-radius:var(--r8);border:none;cursor:pointer;transition:all .2s}
.btn-wa-hero:hover{background:var(--green);transform:translateY(-2px);box-shadow:0 10px 32px rgba(34,197,94,.3)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:9px;background:transparent;color:var(--tx2);
  font-family:var(--fh);font-weight:800;font-size:15px;letter-spacing:.1em;text-transform:uppercase;
  padding:14px 30px;border-radius:var(--r8);border:1.5px solid var(--bor2);cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--red);color:var(--tx);transform:translateY(-2px)}

/* ══════════════════════════════════════════════
   STATS STRIP
══════════════════════════════════════════════ */
.stats{
  background:var(--card);
  border-bottom:1px solid var(--bor);
  display:flex;justify-content:center;flex-wrap:wrap;
  position:relative;overflow:hidden}
.stats::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,var(--red)0%,transparent 30%,transparent 70%,var(--red)100%);
  opacity:.03;pointer-events:none}
.stat{text-align:center;padding:22px 40px;border-right:1px solid var(--bor);flex-shrink:0;position:relative}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--fh);font-weight:900;font-size:2.2rem;color:var(--red);line-height:1;letter-spacing:-.02em}
.stat-l{font-size:11px;color:var(--mu);letter-spacing:.15em;text-transform:uppercase;margin-top:4px;font-weight:500}
@media(max-width:560px){
  .stat{padding:14px 18px;border-right:none;border-bottom:1px solid var(--bor);width:50%}
  .stat:nth-child(odd){border-right:1px solid var(--bor)}
  .stat:last-child{border-bottom:none;width:100%}
}

/* ══════════════════════════════════════════════
   SECTIONS
══════════════════════════════════════════════ */
.sec{padding:80px var(--px)}
.sec-alt{background:var(--sur);border-top:1px solid var(--bor);border-bottom:1px solid var(--bor)}
.sec-lbl{
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.25em;
  text-transform:uppercase;color:var(--red);margin-bottom:10px}
.sec-lbl::before{content:'';width:16px;height:2px;background:var(--red);flex-shrink:0}
.sec-title{font-family:var(--fh);font-weight:900;font-size:clamp(2rem,4.5vw,3.2rem);
  text-transform:uppercase;letter-spacing:-.02em;color:#fff;margin-bottom:12px;line-height:.95}
.sec-title span{color:var(--red)}
.sec-desc{font-size:14px;color:var(--mu);max-width:520px;line-height:1.8;margin-bottom:44px;font-weight:300}

/* ══════════════════════════════════════════════
   BRAND CARDS — HOME
══════════════════════════════════════════════ */
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.brand-card{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:28px 16px 22px;cursor:pointer;text-align:center;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  position:relative;overflow:hidden}
.brand-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 60%);
  pointer-events:none}
.brand-card:hover{transform:translateY(-6px)}
.brand-card .bar{position:absolute;bottom:0;left:0;right:0;height:2px;
  transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.brand-card:hover .bar{transform:scaleX(1)}
.brand-img-box{
  width:82px;height:82px;margin:0 auto 14px;
  background:rgba(255,255,255,.06);border-radius:var(--r12);padding:12px;
  display:flex;align-items:center;justify-content:center}
.brand-img-box img{width:100%;height:100%;object-fit:contain}
.brand-card-name{font-family:var(--fh);font-weight:800;font-size:18px;
  letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-bottom:3px}
.brand-card-sub{font-size:11px;color:var(--mu);letter-spacing:.04em}
.brand-card-arrow{
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:13px;width:30px;height:30px;border-radius:50%;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.25);
  color:var(--red);font-size:14px;transition:background .2s,transform .2s,box-shadow .2s}
.brand-card:hover .brand-card-arrow{background:var(--red);color:#fff;transform:translateX(4px);box-shadow:0 0 12px var(--red-glow)}

/* ══════════════════════════════════════════════
   WHY US CARDS
══════════════════════════════════════════════ */
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.why-card{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:30px 26px;transition:border-color .25s,box-shadow .25s,transform .25s;
  position:relative;overflow:hidden}
.why-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
  transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.why-card:hover{border-color:rgba(232,37,26,.3);box-shadow:0 8px 40px var(--red-pale);transform:translateY(-3px)}
.why-card:hover::after{transform:scaleX(1)}
.why-icon-wrap{
  width:50px;height:50px;border-radius:var(--r12);
  background:var(--red-pale);border:1px solid rgba(232,37,26,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:18px}
.why-title{font-family:var(--fh);font-weight:800;font-size:17px;
  text-transform:uppercase;letter-spacing:.05em;color:#fff;margin-bottom:9px}
.why-desc{font-size:13.5px;color:var(--mu);line-height:1.8;font-weight:300}

/* ══════════════════════════════════════════════
   TRUST BANNER (NEW)
══════════════════════════════════════════════ */
.trust-banner{
  background:linear-gradient(135deg,var(--card2) 0%,var(--card3) 100%);
  border:1px solid var(--bor2);border-radius:var(--r16);
  padding:36px 40px;
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
  margin:0 0 44px;position:relative;overflow:hidden}
.trust-banner::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--red-glow2) 0%,transparent 70%);pointer-events:none}
.trust-text-main{font-family:var(--fh);font-weight:900;font-size:clamp(1.4rem,3vw,2rem);
  text-transform:uppercase;color:#fff;letter-spacing:-.01em;line-height:1}
.trust-text-sub{font-size:13px;color:var(--mu);margin-top:6px;font-weight:300}
.trust-badges{display:flex;gap:10px;flex-wrap:wrap}
.tbadge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.05);border:1px solid var(--bor2);
  font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--tx2);padding:7px 14px;border-radius:100px}
@media(max-width:600px){.trust-banner{grid-template-columns:1fr}.trust-badges{display:none}}

/* ══════════════════════════════════════════════
   SOCIAL STRIP (NEW)
══════════════════════════════════════════════ */
.social-strip{
  background:var(--card);border-top:1px solid var(--bor);border-bottom:1px solid var(--bor);
  padding:28px var(--px);display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:space-between}
.social-strip-lbl{font-family:var(--fh);font-weight:800;font-size:13px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--mu);white-space:nowrap}
.social-links{display:flex;gap:10px;flex-wrap:wrap}
.social-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:100px;border:1px solid var(--bor2);
  font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--tx2);background:var(--card2);transition:all .22s;white-space:nowrap}
.social-pill:hover{transform:translateY(-2px)}
.social-pill.fb:hover{border-color:#1877f2;color:#1877f2;background:rgba(24,119,242,.1)}
.social-pill.yt:hover{border-color:#ff0000;color:#ff0000;background:rgba(255,0,0,.08)}
.social-pill.ig:hover{border-color:#e1306c;color:#e1306c;background:rgba(225,48,108,.08)}
.social-pill.tk:hover{border-color:#00f2ea;color:#00f2ea;background:rgba(0,242,234,.06)}
.social-pill.wa:hover{border-color:#25d366;color:#25d366;background:rgba(37,211,102,.08)}
.social-pill.gb:hover{border-color:#4285f4;color:#4285f4;background:rgba(66,133,244,.08)}

/* ══════════════════════════════════════════════
   CONTACT SECTION
══════════════════════════════════════════════ */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px}
@media(max-width:720px){.contact-grid{grid-template-columns:1fr}}
.contact-items{display:flex;flex-direction:column;gap:16px}
.ci{display:flex;gap:16px;align-items:flex-start}
.ci-icon{
  width:46px;height:46px;border-radius:var(--r12);flex-shrink:0;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.2);
  display:flex;align-items:center;justify-content:center;font-size:18px;margin-top:2px}
.ci-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-weight:600}
.ci-val{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--tx);line-height:1.55}
.ci-val a{color:var(--tx);transition:color .2s}.ci-val a:hover{color:var(--red)}
.social-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.soc-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--card2);border:1px solid var(--bor2);
  color:var(--mu);font-family:var(--fh);font-size:13px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:9px 16px;border-radius:var(--r8);transition:all .2s}
.soc-btn:hover{border-color:var(--red);color:var(--tx);background:var(--red-pale)}
.wa-box{
  background:linear-gradient(135deg,var(--card2) 0%,rgba(37,211,102,.06) 100%);
  border:1px solid rgba(34,197,94,.2);border-radius:var(--r16);
  padding:32px;text-align:center;position:relative;overflow:hidden}
.wa-box::before{
  content:'';position:absolute;bottom:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.1),transparent 70%);pointer-events:none}
.wa-box-icon{font-size:3.2rem;margin-bottom:14px}
.wa-box-title{font-family:var(--fh);font-weight:900;font-size:22px;
  text-transform:uppercase;letter-spacing:-.01em;color:#fff;margin-bottom:8px}
.wa-box-sub{font-size:13px;color:var(--mu);line-height:1.75;margin-bottom:24px;font-weight:300}
.wa-box-btn{
  display:inline-flex;align-items:center;gap:9px;background:var(--green2);color:#fff;
  font-family:var(--fh);font-weight:800;font-size:16px;letter-spacing:.1em;text-transform:uppercase;
  padding:14px 30px;border-radius:var(--r8);transition:all .2s;width:100%;justify-content:center}
.wa-box-btn:hover{background:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,197,94,.3)}
.map-wrap{
  margin-top:44px;border-radius:var(--r16);overflow:hidden;
  border:1px solid var(--bor);height:290px}
.map-wrap iframe{width:100%;height:100%;border:none;filter:grayscale(80%) invert(90%) hue-rotate(190deg)}

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
footer{background:var(--bg);border-top:1px solid var(--bor);padding:56px var(--px) 28px}
.footer-grid{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;
  padding-bottom:40px;border-bottom:1px solid var(--bor)}
@media(max-width:840px){.footer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.footer-grid{grid-template-columns:1fr}}
.footer-logo-en{font-family:var(--fh);font-weight:900;font-size:28px;
  letter-spacing:3px;color:#fff;margin-bottom:2px;text-transform:uppercase}
.footer-logo-en span{color:var(--red)}
.footer-logo-bn{font-family:var(--fbng);font-size:13px;color:var(--red);margin-bottom:16px}
.footer-desc{font-size:13px;color:var(--mu);line-height:1.8;margin-bottom:20px;font-weight:300}
.footer-phones{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.footer-phones a{
  font-family:var(--fh);font-size:14px;font-weight:700;
  color:var(--tx2);transition:color .2s;display:flex;align-items:center;gap:8px}
.footer-phones a:hover{color:var(--red)}
.footer-soc{display:flex;gap:8px}
.fsoc{
  width:36px;height:36px;border-radius:var(--r8);background:var(--card);
  border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:border-color .2s,background .2s,transform .2s}
.fsoc:hover{border-color:var(--red);background:var(--red-pale);transform:translateY(-2px)}
.footer-col h4{
  font-family:var(--fh);font-weight:800;font-size:12px;
  letter-spacing:.15em;text-transform:uppercase;color:#fff;margin-bottom:18px;
  padding-bottom:10px;border-bottom:1px solid var(--bor)}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.footer-col ul li a,.footer-col ul li button{
  font-size:13px;color:var(--mu);transition:color .2s;font-weight:400;
  background:none;border:none;cursor:pointer;padding:0;text-align:left;display:flex;align-items:center;gap:6px}
.footer-col ul li a:hover,.footer-col ul li button:hover{color:var(--tx)}
.footer-col ul li a::before,.footer-col ul li button::before{content:'›';color:var(--mu2);transition:color .2s}
.footer-col ul li a:hover::before,.footer-col ul li button:hover::before{color:var(--red)}
.footer-bottom{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:24px;flex-wrap:wrap;gap:10px}
.footer-copy{font-size:12px;color:var(--mu2)}
.footer-bn{font-family:var(--fbng);font-size:12px;color:var(--mu2)}

/* ══════════════════════════════════════════════
   FLOATING BUTTONS
══════════════════════════════════════════════ */
.float-wa{
  position:fixed;bottom:86px;right:22px;width:54px;height:54px;border-radius:50%;
  background:var(--green2);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:24px;text-decoration:none;
  box-shadow:0 4px 20px rgba(34,197,94,.45),0 0 0 0 rgba(34,197,94,.4);
  z-index:996;transition:all .2s;animation:floatPulse 2.5s infinite}
@keyframes floatPulse{0%,100%{box-shadow:0 4px 20px rgba(34,197,94,.4),0 0 0 0 rgba(34,197,94,.3)}50%{box-shadow:0 4px 20px rgba(34,197,94,.5),0 0 0 10px rgba(34,197,94,.0)}}
.float-wa:hover{transform:scale(1.12);animation:none;box-shadow:0 8px 30px rgba(34,197,94,.5)}
.float-call{
  position:fixed;bottom:22px;right:22px;width:54px;height:54px;border-radius:50%;
  background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:22px;text-decoration:none;
  box-shadow:0 4px 20px var(--red-glow),0 0 0 0 var(--red-glow);
  z-index:996;transition:all .2s;animation:callPulse 3s infinite}
@keyframes callPulse{0%,100%{box-shadow:0 4px 20px var(--red-glow),0 0 0 0 rgba(232,37,26,.25)}50%{box-shadow:0 4px 20px var(--red-glow),0 0 0 10px rgba(232,37,26,.0)}}
.float-call:hover{transform:scale(1.12);animation:none;box-shadow:0 8px 30px var(--red-glow)}

/* ══════════════════════════════════════════════
   INNER PAGES
══════════════════════════════════════════════ */
.inner-page{padding-bottom:64px}
.inner-hero{
  padding:60px var(--px) 44px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--bor)}
.inner-hero-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:40px 40px}
.inner-hero-inner{position:relative;z-index:1;max-width:660px}
.inner-hero h1{
  font-family:var(--fh);font-weight:900;font-size:clamp(2.2rem,5.5vw,3.8rem);
  text-transform:uppercase;line-height:.9;margin-bottom:12px;color:#fff;letter-spacing:-.02em}
.inner-hero h1 em{font-style:normal}
.tag{
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.15em;
  text-transform:uppercase;padding:5px 13px;border-radius:var(--r4);margin-bottom:18px;
  border:1px solid;background:rgba(232,37,26,.08);color:var(--red);border-color:rgba(232,37,26,.3)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.8s infinite;flex-shrink:0}
.ih-sub{color:var(--mu);font-size:14px;line-height:1.75;max-width:500px;font-weight:300}

/* pgrid */
.pgrid{padding:28px var(--px);display:grid;gap:12px;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.pgrid-3{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.pgrid-4{grid-template-columns:repeat(auto-fill,minmax(185px,1fr))}
.pgrid-5{grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}

/* brand-page cards */
.bc{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:28px 18px 22px;cursor:pointer;text-align:center;
  transition:border-color .25s,transform .25s,box-shadow .25s;position:relative;overflow:hidden}
.bc:hover{transform:translateY(-6px)}
.bc .bar{position:absolute;bottom:0;left:0;right:0;height:2px;
  transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.bc:hover .bar{transform:scaleX(1)}
.bc-img{
  width:90px;height:90px;margin:0 auto 14px;
  background:rgba(255,255,255,.07);border-radius:var(--r12);padding:10px;
  display:flex;align-items:center;justify-content:center}
.bc-img img{width:100%;height:100%;object-fit:contain}
.bc-name{font-family:var(--fh);font-weight:900;font-size:20px;
  letter-spacing:.05em;text-transform:uppercase;color:#fff;margin-bottom:4px}
.bc-sub{font-size:12px;color:var(--mu)}
.bc-go{
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:14px;width:32px;height:32px;border-radius:50%;
  border:1.5px solid var(--bor2);color:var(--mu);font-size:14px;transition:all .22s}
.bc:hover .bc-go{background:var(--red);border-color:var(--red);color:#fff;transform:translateX(4px)}

/* model cards */
.mc{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:20px 16px;cursor:pointer;text-align:center;
  transition:border-color .25s,transform .25s;position:relative;overflow:hidden}
.mc:hover{transform:translateY(-4px)}
.mc .bar{position:absolute;bottom:0;left:0;right:0;height:2px;
  transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.mc:hover .bar{transform:scaleX(1)}
.mc-icon{font-size:2.2rem;margin-bottom:11px}
.mc-name{font-family:var(--fh);font-weight:800;font-size:15px;
  text-transform:uppercase;letter-spacing:.04em;color:#fff;margin-bottom:4px;line-height:1.2}
.mc-sub{font-size:11px;color:var(--mu)}

/* category cards */
.cc{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:18px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;
  transition:border-color .25s,transform .25s,box-shadow .25s}
.cc:hover{transform:translateY(-3px)}
.cc-icon{
  width:50px;height:50px;border-radius:var(--r12);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px}
.cc-name{font-family:var(--fh);font-weight:800;font-size:15px;
  text-transform:uppercase;letter-spacing:.04em;color:#fff;margin-bottom:3px}
.cc-count{font-size:12px;color:var(--mu)}

/* search input */
.search-wrap{padding:22px var(--px) 0}
.search-wrap input{
  width:100%;max-width:460px;background:var(--card);
  border:1px solid var(--bor2);border-radius:var(--r8);color:var(--tx);
  font-family:var(--fb);font-size:14px;padding:12px 18px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-wrap input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-pale)}
.search-wrap input::placeholder{color:var(--mu2)}

/* part cards */
.pc{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);
  padding:18px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;
  display:flex;flex-direction:column}
.pc:hover{transform:translateY(-3px)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:7px}
.pc-name{font-family:var(--fh);font-weight:800;font-size:14px;
  text-transform:uppercase;letter-spacing:.04em;flex:1;line-height:1.25;color:#fff}
.pc-price{font-family:var(--fh);font-weight:900;font-size:17px;color:var(--amber2);white-space:nowrap}
.pc-sku{font-size:11px;color:var(--mu2);margin-bottom:9px;font-family:'DM Mono',monospace,var(--fb);letter-spacing:.05em}
.pc-bot{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:10px}
.stock{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.22);
  color:var(--green);font-size:11px;font-family:var(--fh);font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:100px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.cat-lbl{font-size:11px;color:var(--mu2)}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--green2);color:#fff;font-family:var(--fh);font-weight:800;
  font-size:12px;text-transform:uppercase;letter-spacing:.07em;
  padding:9px;border-radius:var(--r8);border:none;cursor:pointer;
  width:100%;margin-top:auto;transition:all .2s}
.wa-btn:hover{background:var(--green);box-shadow:0 4px 14px rgba(34,197,94,.3)}
.no-res{grid-column:1/-1;text-align:center;padding:70px;color:var(--mu)}
.no-res .big{font-size:3.5rem;margin-bottom:14px}
.no-res p{font-family:var(--fh);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.1em}

/* ══════════════════════════════════════════════
   PRODUCT DETAIL
══════════════════════════════════════════════ */
.det-wrap{padding:36px var(--px);max-width:1140px;margin:0 auto}
.det-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:36px;align-items:start}
@media(max-width:720px){.det-grid{grid-template-columns:1fr}}
.img-box{
  background:var(--card);border:1px solid var(--bor);border-radius:var(--r16);
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;position:relative;overflow:hidden}
.img-bg-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(232,37,26,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,37,26,.025) 1px,transparent 1px);
  background-size:28px 28px}
.img-emoji{font-size:5.5rem;position:relative;z-index:1}
.img-lbl{
  font-family:var(--fh);font-size:12px;color:var(--mu);
  text-transform:uppercase;letter-spacing:.12em;position:relative;z-index:1;text-align:center;padding:0 12px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.meta-item{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r8);padding:11px 14px}
.meta-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;font-weight:600}
.meta-val{font-family:var(--fh);font-weight:800;font-size:14px;color:var(--tx)}
.det-brand-tag{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid rgba(232,37,26,.3);color:var(--red);
  font-family:var(--fh);font-size:12px;font-weight:800;letter-spacing:.15em;
  text-transform:uppercase;padding:4px 12px;border-radius:100px;
  margin-bottom:11px;background:var(--red-pale)}
.det-name{font-family:var(--fh);font-weight:900;
  font-size:clamp(1.5rem,3.5vw,2.4rem);text-transform:uppercase;
  line-height:1.0;margin-bottom:6px;color:#fff;letter-spacing:-.02em}
.det-model{font-size:13px;color:var(--mu);margin-bottom:18px;font-weight:300}
.price-row{display:flex;align-items:baseline;gap:14px;margin-bottom:18px}
.det-price{font-family:var(--fh);font-weight:900;font-size:2.2rem;color:var(--amber2);letter-spacing:-.02em}
.det-desc{color:var(--tx2);line-height:1.8;margin-bottom:18px;font-size:14px;font-weight:300}
.notes-box{
  font-size:13px;color:var(--mu);margin-bottom:18px;padding:12px 16px;
  background:rgba(245,158,11,.06);border-radius:var(--r8);border-left:3px solid var(--amber)}
.wa-big{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--green2);color:#fff;font-family:var(--fh);font-weight:800;
  font-size:17px;text-transform:uppercase;letter-spacing:.08em;
  padding:16px 24px;border-radius:var(--r12);text-decoration:none;
  transition:all .2s;width:100%;border:none;cursor:pointer;margin-bottom:18px}
.wa-big:hover{background:var(--green);transform:translateY(-2px);box-shadow:0 10px 28px rgba(34,197,94,.3)}

/* admin panel */
.admin-lock{background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);padding:28px;margin-top:10px;text-align:center}
.lock-icon{font-size:2.4rem;margin-bottom:10px}
.lock-title{font-family:var(--fh);font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:16px}
.lock-input{width:100%;max-width:270px;background:var(--bg);border:1px solid var(--bor2);border-radius:var(--r8);color:var(--tx);font-family:var(--fb);font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s,box-shadow .2s;text-align:center;letter-spacing:.2em;margin-bottom:12px}
.lock-input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-pale)}
.lock-btn{background:var(--red);color:#fff;font-family:var(--fh);font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.1em;padding:10px 28px;border-radius:var(--r8);border:none;cursor:pointer;transition:all .2s}
.lock-btn:hover{background:var(--red3)}
.lock-err{color:#ef4444;font-size:12px;margin-top:8px;display:none}
.edit-section{background:var(--card);border:1px solid var(--bor);border-radius:var(--r12);padding:24px;margin-top:10px}
.edit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}

/* ══ HELPERS ══ */
function h(s){let v=0;for(let c of s)v=(v*31+c.charCodeAt(0))&0xffff;return v;}
function calcPrice(b,m,p){return 150+(h(b+m+p)%4351);}
function calcStock(b,m,p){return[3,5,8,12,15,20,25][h(b+m+p+b)%7];}
function calcSku(b,m,p){
  const B=b.slice(0,2).toUpperCase(),M=m.replace(/\s/g,'').slice(0,3).toUpperCase(),P=p.replace(/\s/g,'').slice(0,3).toUpperCase();
  return`${B}-${M}-${P}${(h(b+m+p)&0xfff).toString(16).toUpperCase().padStart(3,'0')}`;
}
function skey(b,m,p){return'map_'+calcSku(b,m,p);}
function loadPart(b,m,p){try{return JSON.parse(localStorage.getItem(skey(b,m,p)))||{};}catch{return{};}}
function savePart(b,m,p,d){localStorage.setItem(skey(b,m,p),JSON.stringify(d));}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('pg-'+id);
  pg.classList.add('active');pg.classList.remove('fade-in');void pg.offsetWidth;pg.classList.add('fade-in');
  window.scrollTo({top:0,behavior:'smooth'});
  // trigger scroll reveals
  setTimeout(()=>{
    pg.querySelectorAll('.reveal').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('visible'),i*60);
    });
  },50);
}

  if(S.part)items.push({l:S.part.length>18?S.part.slice(0,16)+'…':S.part,fn:null});

}

/* ══ SCROLL REVEAL OBSERVER ══ */
const revealObserver=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});
},{threshold:.1});
function observeReveals(){
  document.querySelectorAll('.reveal:not(.visible)').forEach(el=>revealObserver.observe(el));
}
// re-observe on page change
const _origShowPage=showPage;
function showPage(id){
  _origShowPage(id);
  setTimeout(observeReveals,100);
}
