<style>
/* ══════════════════════════════════════
   RESET & VARS
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#0c0d0e;
  --sur:#111416;
  --card:#161a1d;
  --card2:#1c2025;
  --bor:#22262b;
  --bor2:#2e343b;
  --red:#e8251a;
  --red2:#b51e15;
  --red-pale:rgba(232,37,26,0.1);
  --red-glow:rgba(232,37,26,0.2);
  --amber:#f5a623;
  --green:#22c55e;
  --tx:#e8eaed;
  --mu:#8a9099;
  --mu2:#5e6670;
  --fh:'Rajdhani',sans-serif;
  --fb:'Inter',sans-serif;
  --fbng:'Noto Serif Bengali',serif;
  --rad:10px;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);overflow-x:hidden;min-height:100vh;font-size:15px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}

/* grain texture */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.45;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E")}

/* pages */
.page{display:none;min-height:100vh;position:relative;z-index:1}
.page.active{display:block}
.fade-in{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════
   ANNOUNCEMENT BAR
══════════════════════════════════════ */
.ann{background:var(--red);color:#fff;text-align:center;padding:7px 16px;
  font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.5px;line-height:1.4}
.ann a{color:#fff;font-weight:700;text-decoration:underline;text-underline-offset:2px}

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
nav{position:sticky;top:0;z-index:990;height:62px;
  background:rgba(12,13,14,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bor);
  display:flex;align-items:center;justify-content:space-between;padding:0 5%;gap:12px}
.logo{display:flex;flex-direction:column;line-height:1;cursor:pointer;flex-shrink:0;gap:1px}
.logo-en{font-family:var(--fh);font-weight:700;font-size:22px;letter-spacing:2px;color:#fff}
.logo-en span{color:var(--red)}
.logo-bn{font-family:var(--fbng);font-size:10px;color:var(--mu);letter-spacing:.5px}
.breadcrumb{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap;overflow:hidden;padding:0 8px}
.crumb{font-family:var(--fh);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--mu);cursor:pointer;background:none;border:none;padding:2px 4px;transition:color .2s;white-space:nowrap}
.crumb:hover,.crumb.cur{color:var(--red)}
.sep{color:var(--bor2);font-size:.9rem;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-wa{display:inline-flex;align-items:center;gap:6px;background:#22c55e;color:#fff;
  font-family:var(--fh);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  padding:7px 14px;border-radius:7px;transition:all .2s;white-space:nowrap}
.nav-wa:hover{background:#16a34a;transform:translateY(-1px)}
.nav-call{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;
  font-family:var(--fh);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  padding:7px 14px;border-radius:7px;transition:all .2s;white-space:nowrap}
.nav-call:hover{background:var(--red2);transform:translateY(-1px)}
@media(max-width:600px){.nav-call{display:none}.breadcrumb{display:none}}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero{padding:72px 5% 56px;position:relative;overflow:hidden;
  border-bottom:1px solid var(--bor);
  background:linear-gradient(135deg,#0c0d0e 0%,#111618 100%)}
.hero-grid{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(232,37,26,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(232,37,26,.025) 1px,transparent 1px);
  background-size:44px 44px}
.hero-glow{position:absolute;top:-100px;right:-80px;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,37,26,.08) 0%,transparent 65%);pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:700px}
.hero-tag{display:inline-flex;align-items:center;gap:8px;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.35);
  color:var(--red);font-family:var(--fh);font-size:12px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;padding:5px 14px;border-radius:4px;margin-bottom:22px}
.htdot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:var(--fh);font-weight:700;font-size:clamp(2.4rem,6vw,4.4rem);
  line-height:.92;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:10px;color:#fff}
.hero h1 em{font-style:normal;color:var(--red);display:block}
.hero-bn{font-family:var(--fbng);font-size:clamp(1rem,2.5vw,1.4rem);color:var(--mu);margin-bottom:18px}
.hero-sub{color:var(--mu);font-size:15px;max-width:540px;margin-bottom:32px;line-height:1.7}
.hero-sub strong{color:var(--tx)}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-red{display:inline-flex;align-items:center;gap:9px;background:var(--red);color:#fff;
  font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  padding:13px 28px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
.btn-red:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 8px 28px var(--red-glow)}
.btn-wa-hero{display:inline-flex;align-items:center;gap:9px;background:#22c55e;color:#fff;
  font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  padding:13px 28px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
.btn-wa-hero:hover{background:#16a34a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(34,197,94,.3)}
.btn-ghost{display:inline-flex;align-items:center;gap:9px;background:transparent;color:var(--tx);
  font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  padding:13px 28px;border-radius:8px;border:1.5px solid var(--bor2);cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--red);color:var(--red);transform:translateY(-2px)}

/* ══════════════════════════════════════
   STATS STRIP
══════════════════════════════════════ */
.stats{background:var(--sur);border-bottom:1px solid var(--bor);
  display:flex;justify-content:center;flex-wrap:wrap}
.stat{text-align:center;padding:20px 36px;border-right:1px solid var(--bor);flex-shrink:0}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--fh);font-weight:700;font-size:1.9rem;color:var(--red);line-height:1}
.stat-l{font-size:11px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
@media(max-width:540px){
  .stat{padding:14px 16px;border-right:none;border-bottom:1px solid var(--bor);width:50%}
  .stat:nth-child(odd){border-right:1px solid var(--bor)}
  .stat:last-child{border-bottom:none;width:100%}
}

/* ══════════════════════════════════════
   SECTIONS COMMON
══════════════════════════════════════ */
.sec{padding:72px 5%}
.sec-alt{background:var(--sur);border-top:1px solid var(--bor);border-bottom:1px solid var(--bor)}
.sec-lbl{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);margin-bottom:8px}
.sec-title{font-family:var(--fh);font-weight:700;font-size:clamp(1.8rem,4vw,2.8rem);
  text-transform:uppercase;letter-spacing:-.01em;color:#fff;margin-bottom:10px;line-height:1}
.sec-title span{color:var(--red)}
.sec-desc{font-size:14px;color:var(--mu);max-width:520px;line-height:1.75;margin-bottom:40px}

/* ══════════════════════════════════════
   BRAND CARDS (home)
══════════════════════════════════════ */
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.brand-card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--rad);
  padding:24px 16px 20px;cursor:pointer;text-align:center;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  position:relative;overflow:hidden}
.brand-card:hover{transform:translateY(-5px)}
.brand-card .bar{position:absolute;bottom:0;left:0;right:0;height:3px;
  transform:scaleX(0);transform-origin:left;transition:transform .3s}
.brand-card:hover .bar{transform:scaleX(1)}
.brand-img-box{width:80px;height:80px;margin:0 auto 12px;
  background:rgba(255,255,255,.06);border-radius:10px;padding:10px;
  display:flex;align-items:center;justify-content:center}
.brand-img-box img{width:100%;height:100%;object-fit:contain}
.brand-card-name{font-family:var(--fh);font-weight:700;font-size:18px;
  letter-spacing:.05em;text-transform:uppercase;color:#fff;margin-bottom:3px}
.brand-card-sub{font-size:11px;color:var(--mu);letter-spacing:.05em}
.brand-card-arrow{display:inline-flex;align-items:center;justify-content:center;
  margin-top:12px;width:28px;height:28px;border-radius:50%;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.3);
  color:var(--red);font-size:13px;transition:background .2s,transform .2s}
.brand-card:hover .brand-card-arrow{background:var(--red);color:#fff;transform:translateX(3px)}

/* ══════════════════════════════════════
   WHY US CARDS
══════════════════════════════════════ */
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.why-card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--rad);
  padding:28px 24px;transition:border-color .2s,box-shadow .2s}
.why-card:hover{border-color:rgba(232,37,26,.4);box-shadow:0 4px 30px var(--red-pale)}
.why-icon-wrap{width:48px;height:48px;border-radius:10px;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.25);
  display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.why-title{font-family:var(--fh);font-weight:700;font-size:16px;
  text-transform:uppercase;letter-spacing:.05em;color:#fff;margin-bottom:8px}
.why-desc{font-size:13px;color:var(--mu);line-height:1.75}

/* ══════════════════════════════════════
   CONTACT
══════════════════════════════════════ */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:700px){.contact-grid{grid-template-columns:1fr}}
.contact-items{display:flex;flex-direction:column;gap:16px}
.ci{display:flex;gap:14px;align-items:flex-start}
.ci-icon{width:44px;height:44px;border-radius:9px;flex-shrink:0;
  background:var(--red-pale);border:1px solid rgba(232,37,26,.25);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.ci-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:3px}
.ci-val{font-family:var(--fh);font-size:15px;font-weight:600;color:var(--tx);line-height:1.5}
.ci-val a{color:var(--tx);transition:color .2s}.ci-val a:hover{color:var(--red)}
.social-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:8px}
.soc-btn{display:inline-flex;align-items:center;gap:7px;
  background:var(--card2);border:1px solid var(--bor2);
  color:var(--mu);font-family:var(--fh);font-size:13px;font-weight:600;
  letter-spacing:.05em;padding:9px 16px;border-radius:7px;transition:all .2s}
.soc-btn:hover{border-color:var(--red);color:var(--tx);background:var(--red-pale)}
.wa-box{background:var(--card2);border:1.5px solid var(--bor2);border-radius:var(--rad);
  padding:28px;text-align:center}
.wa-box-icon{font-size:3rem;margin-bottom:12px}
.wa-box-title{font-family:var(--fh);font-weight:700;font-size:20px;
  text-transform:uppercase;color:#fff;margin-bottom:6px}
.wa-box-sub{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:20px}
.wa-box-btn{display:inline-flex;align-items:center;gap:9px;background:#22c55e;color:#fff;
  font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  padding:13px 28px;border-radius:8px;transition:all .2s}
.wa-box-btn:hover{background:#16a34a;transform:translateY(-2px)}
.map-wrap{margin-top:40px;border-radius:var(--rad);overflow:hidden;
  border:1.5px solid var(--bor);height:280px}
.map-wrap iframe{width:100%;height:100%;border:none;filter:grayscale(80%) invert(90%) hue-rotate(190deg)}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer{background:var(--bg);border-top:1px solid var(--bor);padding:48px 5% 24px}
.footer-grid{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:36px;
  padding-bottom:36px;border-bottom:1px solid var(--bor)}
@media(max-width:800px){.footer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.footer-grid{grid-template-columns:1fr}}
.footer-logo-en{font-family:var(--fh);font-weight:700;font-size:26px;
  letter-spacing:2px;color:#fff;margin-bottom:2px}
.footer-logo-en span{color:var(--red)}
.footer-logo-bn{font-family:var(--fbng);font-size:13px;color:var(--red);margin-bottom:14px}
.footer-desc{font-size:13px;color:var(--mu);line-height:1.75;margin-bottom:18px}
.footer-phones{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.footer-phones a{font-family:var(--fh);font-size:14px;font-weight:600;
  color:var(--tx);transition:color .2s;display:flex;align-items:center;gap:7px}
.footer-phones a:hover{color:var(--red)}
.footer-soc{display:flex;gap:8px}
.fsoc{width:34px;height:34px;border-radius:7px;background:var(--card);
  border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;

  }else{S={page:'home',brand:null,model:null,cat:null,part:null,adminUnlocked:false};renderCurrentPage();updateBreadcrumb();}
});

function pushState(page,extra){
  if(_histPushed)return;
  const st={page,brand:S.brand,model:S.model,cat:S.cat,part:S.part,...extra};
  history.pushState(st,'','#'+page+(S.brand?'/'+encodeURIComponent(S.brand):''));
}

/* ══ HELPERS ══ */
function h(s){let v=0;for(let c of s)v=(v*31+c.charCodeAt(0))&0xffff;return v;}
function calcPrice(b,m,p){return 150+(h(b+m+p)%4351);}
function calcStock(b,m,p){return[3,5,8,12,15,20,25][h(b+m+p+b)%7];}
function calcSku(b,m,p){
  const B=b.slice(0,2).toUpperCase(),M=m.replace(/\s/g,'').slice(0,3).toUpperCase(),P=p.replace(/\s/g,'').slice(0,3).toUpperCase();
  return`${B}-${M}-${P}${(h(b+m+p)&0xfff).toString(16).toUpperCase().padStart(3,'0')}`;
}
function skey(b,m,p){return'map_'+calcSku(b,m,p);}
function loadPart(b,m,p){try{return JSON.parse(localStorage.getItem(skey(b,m,p)))||{};}catch{return{};}}
function savePart(b,m,p,d){localStorage.setItem(skey(b,m,p),JSON.stringify(d));}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('pg-'+id);
  pg.classList.add('active');pg.classList.remove('fade-in');void pg.offsetWidth;pg.classList.add('fade-in');
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderCurrentPage(){
  switch(S.page){
    case'home':renderHome();showPage('home');break;
    case'brands':renderBrands();showPage('brands');break;
    case'models':renderModels();showPage('models');break;
    case'categories':renderCategories();showPage('categories');break;
    case'parts':renderParts();showPage('parts');break;
    case'product':renderProduct();showPage('product');break;
  }
}

/* ══ BREADCRUMB ══ */
function updateBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  const items=[];
  if(S.page!=='home')items.push({l:'Brands',fn:'navBrands'});
  if(S.brand)items.push({l:S.brand,fn:'navModels'});
  if(S.model)items.push({l:S.model,fn:'navCats'});
  if(S.cat)items.push({l:S.cat,fn:'navParts'});
  if(S.part)items.push({l:S.part.length>18?S.part.slice(0,16)+'…':S.part,fn:null});
  bc.innerHTML=items.map((c,i)=>`${i>0?'<span class="sep">›</span>':''}<button class="crumb${i===items.length-1?' cur':''}" ${c.fn?`onclick="${c.fn}()"`:''}>${c.l}</button>`).join('');
}

/* ══ ADMIN ══ */
function checkPass(){
  const inp=document.getElementById('admin-pass');if(!inp)return;
  if(inp.value===ADMIN_PASS){S.adminUnlocked=true;renderProduct();}
  else{
    const e=document.getElementById('lock-err');if(e)e.style.display='block';
    inp.value='';inp.style.borderColor='#ef4444';
    setTimeout(()=>{if(inp)inp.style.borderColor='var(--bor)';},1200);
  }
}
function adminLogout(){S.adminUnlocked=false;renderProduct();}
function saveProduct(){
  const {brand,model,part}=S;
  savePart(brand,model,part,{
    desc:document.getElementById('ed-desc')?.value||'',
    partNo:document.getElementById('ed-partno')?.value||'',
    weight:document.getElementById('ed-weight')?.value||'',
    warranty:document.getElementById('ed-warranty')?.value||'',
    origin:document.getElementById('ed-origin')?.value||'',
    notes:document.getElementById('ed-notes')?.value||'',
  });
  const ok=document.getElementById('saved-ok');
  if(ok){ok.style.display='inline-flex';setTimeout(()=>{ok.style.display='none';},2600);}
  renderProduct();
}
